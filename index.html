<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>JSON Editor</title>
    </head>
    <body>
        <main class="app-shell">
            <header class="topbar" aria-label="JSON editor toolbar">
                <div class="workspace-context">
                    <div class="brand">
                        <span class="brand-mark" aria-hidden="true">{ }</span>
                        <span>JSON Editor</span>
                    </div>
                    <div class="workspace-switch" aria-label="工作模式">
                        <button
                            id="edit-mode-button"
                            class="workspace-switch-button is-active"
                            type="button"
                            aria-pressed="true"
                        >
                            编辑
                        </button>
                        <button
                            id="compare-mode-button"
                            class="workspace-switch-button"
                            type="button"
                            aria-pressed="false"
                        >
                            对比
                        </button>
                    </div>
                    <div class="filebar">
                        <div class="file-list-wrap">
                            <div class="directory-controls">
                                <button
                                    id="directory-label"
                                    class="directory-label"
                                    type="button"
                                    aria-expanded="false"
                                >
                                    <svg
                                        class="dir-icon"
                                        width="14"
                                        height="14"
                                        viewBox="0 0 20 20"
                                        fill="currentColor"
                                        aria-hidden="true"
                                    >
                                        <path
                                            d="M2 6V4c0-.55.45-1 1-1h4.5l2 2H17c.55 0 1 .45 1 1v1H2zm-1 2h18l-1.5 8c-.1.55-.55 1-1.1 1H3.6c-.55 0-1-.45-1.1-1L1 8z"
                                        />
                                    </svg>
                                    <span class="dir-text">未设置</span>
                                </button>
                                <button
                                    id="directory-edit-button"
                                    class="dir-edit-btn"
                                    type="button"
                                    aria-label="切换目录"
                                >
                                    <svg class="button-icon" viewBox="0 0 16 16" aria-hidden="true">
                                        <path d="M1.5 4.5h5l1.5 1.5h6.5v7.5h-13zM10.5 8v4M8.5 10h4" />
                                    </svg>
                                </button>
                            </div>
                            <div
                                id="file-list-panel"
                                class="file-list-panel"
                                hidden
                            >
                                <div
                                    id="file-list"
                                    class="file-list"
                                    role="listbox"
                                    aria-label="JSON 文件列表"
                                ></div>
                            </div>
                        </div>
                        <span
                            id="current-file-label"
                            class="current-file-label"
                            aria-label="当前文件"
                            hidden
                        ></span>
                    </div>
                </div>

                <div id="compare-topbar-actions" class="compare-topbar-actions" hidden>
                    <div class="difference-menu">
                        <div id="difference-counts" class="difference-counts" aria-label="JSON 差异统计">
                            <button class="difference-count is-added" type="button" data-difference-type="added" aria-expanded="false" disabled>
                                新增 <strong id="added-count">0</strong>
                            </button>
                            <span aria-hidden="true">·</span>
                            <button class="difference-count is-removed" type="button" data-difference-type="removed" aria-expanded="false" disabled>
                                删除 <strong id="removed-count">0</strong>
                            </button>
                            <span aria-hidden="true">·</span>
                            <button class="difference-count is-changed" type="button" data-difference-type="changed" aria-expanded="false" disabled>
                                修改 <strong id="changed-count">0</strong>
                            </button>
                        </div>
                        <div id="difference-panel" class="difference-panel" hidden>
                            <div id="difference-list" class="difference-list" role="list" aria-label="过滤后的 JSON 差异"></div>
                        </div>
                    </div>
                    <button id="swap-compare-button" class="ghost-button" type="button">
                        交换两侧
                    </button>
                    <button id="apply-compare-button" class="save-button" type="button" disabled>
                        应用右侧到编辑器
                    </button>
                </div>
                <div class="actions">
                    <button
                        id="settings-button"
                        class="icon-button settings-button"
                        type="button"
                        aria-label="智能格式化设置"
                        title="智能格式化设置"
                    >
                        <svg class="button-icon" viewBox="0 0 16 16" aria-hidden="true">
                            <path d="M2 4h12M2 8h12M2 12h12M5 2.5v3M11 6.5v3M7 10.5v3" />
                        </svg>
                    </button>
                    <span id="save-status" class="save-status" role="status"
                        >Ready</span
                    >
                    <button
                        id="save-new-button"
                        class="secondary-button"
                        type="button"
                    >
                        <svg class="button-icon" viewBox="0 0 16 16" aria-hidden="true">
                            <path d="M8 2v12M2 8h12" />
                        </svg>
                        新建保存
                    </button>
                    <button id="save-button" class="save-button" type="button">
                        <svg class="button-icon" viewBox="0 0 16 16" aria-hidden="true">
                            <path d="M3 2.5h8l2 2V13H3zM5 2.5v4h6v-4M5.5 10h5" />
                        </svg>
                        保存
                    </button>
                    <button
                        id="delete-current-button"
                        class="danger-button"
                        type="button"
                    >
                        <svg class="button-icon" viewBox="0 0 16 16" aria-hidden="true">
                            <path d="M2.5 4h11M6 2h4l.5 2h-5zM4.5 4l.7 9h5.6l.7-9M6.5 6.5v4M9.5 6.5v4" />
                        </svg>
                        删除
                    </button>
                </div>
            </header>
            <section class="editor-section" aria-label="JSON editor">
                <div id="edit-workspace" class="edit-workspace">
                    <div id="editor" class="editor"></div>
                </div>
                <div id="compare-workspace" class="compare-workspace" hidden>
                    <div id="compare-message" class="compare-message" role="status" hidden></div>
                    <div class="compare-grid">
                        <header class="compare-pane-header">
                            <strong>原始 JSON</strong>
                            <select id="compare-left-file" class="compare-file-select" aria-label="载入原始 JSON 文件">
                                <option value="">从目录载入...</option>
                            </select>
                        </header>
                        <header class="compare-pane-header">
                            <strong>目标 JSON</strong>
                            <select id="compare-right-file" class="compare-file-select" aria-label="载入目标 JSON 文件">
                                <option value="">从目录载入...</option>
                            </select>
                        </header>
                        <div id="compare-merge-editor" class="compare-merge-editor" aria-label="JSON 文本差异"></div>
                    </div>
                </div>
            </section>
        </main>
        <dialog id="rename-dialog" class="rename-dialog">
            <form id="rename-form" method="dialog">
                <label class="rename-label" for="rename-input">文件名</label>
                <input
                    id="rename-input"
                    class="rename-input"
                    name="file-name"
                    autocomplete="off"
                />
                <div class="dialog-actions">
                    <button
                        id="rename-cancel-button"
                        class="ghost-button"
                        type="button"
                    >
                        取消
                    </button>
                    <button class="save-button" type="submit">保存</button>
                </div>
            </form>
        </dialog>
        <dialog id="settings-dialog" class="settings-dialog">
            <form id="settings-form" method="dialog" novalidate>
                <div>
                    <label class="settings-label" for="smart-format-line-length">
                        智能格式化最大行宽
                    </label>
                    <p class="settings-help">短数组和对象会尽量保持在这个宽度以内。</p>
                </div>
                <input
                    id="smart-format-line-length"
                    class="settings-input"
                    name="smart-format-line-length"
                    type="number"
                    min="40"
                    max="500"
                    step="1"
                    inputmode="numeric"
                    required
                />
                <p id="settings-error" class="settings-error" role="alert" hidden></p>
                <div class="dialog-actions">
                    <button id="settings-cancel-button" class="ghost-button" type="button">
                        取消
                    </button>
                    <button class="save-button" type="submit">保存设置</button>
                </div>
            </form>
        </dialog>
        <script type="module" src="/src/main.js"></script>
    </body>
</html>
